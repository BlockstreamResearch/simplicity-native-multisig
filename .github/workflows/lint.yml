name: Lint

on:
  push:
    branches:
      - main
  pull_request:
  workflow_call:

permissions:
  contents: read

env:
  SIMPLEX_VERSION: v0.0.5

jobs:
  lint:
    name: Format and Clippy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust (stable)
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install cargo-rbmt
        run: cargo install cargo-rbmt --locked --version 0.3.0

      - name: Install rbmt toolchains
        run: cargo rbmt toolchains --lock-file existing

      - name: Install Simplex
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL --retry 5 --retry-all-errors --retry-delay 2 https://smplx.simplicity-lang.org | bash
          BASE_DIR="${XDG_CONFIG_HOME:-$HOME}"
          SIMPLEX_DIR="${SIMPLEX_DIR:-$BASE_DIR/.simplex}"
          SIMPLEX_BIN_DIR="$SIMPLEX_DIR/bin"
          "$SIMPLEX_BIN_DIR/simplexup" --install "$SIMPLEX_VERSION"
          "$SIMPLEX_BIN_DIR/simplexup" --use "$SIMPLEX_VERSION"
          echo "$SIMPLEX_BIN_DIR" >> "$GITHUB_PATH"
          "$SIMPLEX_BIN_DIR/simplex" --version

      - name: Generate contract artifacts
        working-directory: crates/contracts
        run: simplex build

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: RBMT lint
        run: cargo rbmt lint --lock-file existing
