name: Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_call:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  SIMPLEX_VERSION: v0.0.5

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        toolchain: ["1.91.0", "stable"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust ${{ matrix.toolchain }}
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ matrix.toolchain }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install Simplex
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL --retry 5 --retry-all-errors --retry-delay 2 https://smplx.simplicity-lang.org | bash
          BASE_DIR="${XDG_CONFIG_HOME:-$HOME}"
          SIMPLEX_DIR="${SIMPLEX_DIR:-$BASE_DIR/.simplex}"
          SIMPLEX_BIN_DIR="$SIMPLEX_DIR/bin"
          "$SIMPLEX_BIN_DIR/simplexup" --install "$SIMPLEX_VERSION"
          "$SIMPLEX_BIN_DIR/simplexup" --use "$SIMPLEX_VERSION"
          echo "$SIMPLEX_BIN_DIR" >> "$GITHUB_PATH"
          "$SIMPLEX_BIN_DIR/simplex" --version

      - name: Generate contract artifacts
        working-directory: crates/contracts
        run: simplex build

      - name: Run Rust tests
        run: |
          cargo test --workspace --all-features --lib
          cargo test --workspace --all-features --doc

      - name: Run Simplex tests
        working-directory: crates/contracts
        run: simplex test
